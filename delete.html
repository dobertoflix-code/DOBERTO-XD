<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Supprimer toutes les sessions</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  background: rgba(0,0,0,0.85);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
button {
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 8px;
  background: #ff6b6b;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  margin-top: 20px;
}
button:hover {
  background: #e53935;
}
#result {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
  <h2>Supprimer toutes les sessions</h2>
  <p>⚠️ Cette action est irréversible</p>
  <button id="deleteAllBtn">Tout Supprimer</button>
  <div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
const deleteAllBtn = document.getElementById("deleteAllBtn");
const resultDiv = document.getElementById("result");

deleteAllBtn.addEventListener("click", async () => {
  resultDiv.innerHTML = "<span style='color:#fff'>Suppression en cours...</span>";
  try {
    const { data } = await axios.post("/api/session/deleteAll");
    if (data.ok) {
      resultDiv.innerHTML = `<span style='color:#4caf50'>${data.message}</span>`;
    } else {
      resultDiv.innerHTML = `<span style='color:#ff6b6b'>Erreur: ${data.error || "Impossible de supprimer"}</span>`;
    }
  } catch (err) {
    resultDiv.innerHTML = "<span style='color:#ff6b6b'>Erreur de connexion</span>";
  }
});
</script>

</body>
</html>
