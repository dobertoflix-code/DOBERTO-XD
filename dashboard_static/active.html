<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions Actives - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-card .label {
            color: #666;
            margin-top: 0.5rem;
        }
        .session-list {
            list-style: none;
            margin-top: 1rem;
        }
        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            transition: transform 0.3s;
        }
        .session-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }
        .session-number {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .status-badge {
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        .btn-refresh {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-refresh:hover { background: #5a6fd8; }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>📊 Sessions Actives</h1>
        
        <button class="btn-refresh" onclick="loadActiveSessions()">🔄 Actualiser</button>
        
        <div class="stats">
            <div class="stat-card">
                <div class="value" id="activeCount">0</div>
                <div class="label">Sessions Actives</div>
            </div>
            <div class="stat-card">
                <div class="value" id="botName">-</div>
                <div class="label">Nom du Bot</div>
            </div>
            <div class="stat-card">
                <div class="value" id="timestamp">-</div>
                <div class="label">Dernière mise à jour</div>
            </div>
        </div>
        
        <div id="sessionList" class="session-list"></div>
    </div>

    <script>
        async function loadActiveSessions() {
            try {
                const response = await fetch('/active');
                const data = await response.json();
                
                document.getElementById('activeCount').textContent = data.count || 0;
                document.getElementById('botName').textContent = data.botName || 'DOBERTO-XD';
                document.getElementById('timestamp').textContent = data.timestamp || '-';
                
                const listDiv = document.getElementById('sessionList');
                
                if (data.numbers && data.numbers.length > 0) {
                    listDiv.innerHTML = '';
                    data.numbers.forEach(number => {
                        const item = document.createElement('div');
                        item.className = 'session-item';
                        item.innerHTML = `
                            <span class="session-number">${number}</span>
                            <span class="status-badge">ACTIF</span>
                        `;
                        listDiv.appendChild(item);
                    });
                } else {
                    listDiv.innerHTML = '<div class="empty-state">📭 Aucune session active pour le moment</div>';
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        loadActiveSessions();
        setInterval(loadActiveSessions, 10000); // Actualisation toutes les 10 secondes
    </script>
</body>
</html>
