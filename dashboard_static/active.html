<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions Actives - DOBERTO-XD</title>
    <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>📊 Sessions Actives</h1>
        
        <button class="btn-refresh" onclick="loadActiveSessions()">🔄 Actualiser</button>
        
        <div class="stats">
            <div class="stat-card">
                <div class="value" id="activeCount">0</div>
                <div class="label">Sessions Actives</div>
            </div>
            <div class="stat-card">
                <div class="value" id="botName">-</div>
                <div class="label">Nom du Bot</div>
            </div>
            <div class="stat-card">
                <div class="value" id="timestamp">-</div>
                <div class="label">Dernière mise à jour</div>
            </div>
        </div>
        
        <div id="sessionList" class="session-list"></div>
    </div>

    <script>
        async function loadActiveSessions() {
            try {
                const response = await fetch('/active');
                const data = await response.json();
                
                document.getElementById('activeCount').textContent = data.count || 0;
                document.getElementById('botName').textContent = data.botName || 'DOBERTO-XD';
                document.getElementById('timestamp').textContent = data.timestamp || '-';
                
                const listDiv = document.getElementById('sessionList');
                
                if (data.numbers && data.numbers.length > 0) {
                    listDiv.innerHTML = '';
                    data.numbers.forEach(number => {
                        const item = document.createElement('div');
                        item.className = 'session-item';
                        item.innerHTML = `
                            <span class="session-number">${number}</span>
                            <span class="status-badge">ACTIF</span>
                        `;
                        listDiv.appendChild(item);
                    });
                } else {
                    listDiv.innerHTML = '<div class="empty-state">📭 Aucune session active pour le moment</div>';
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        loadActiveSessions();
        setInterval(loadActiveSessions, 10000); // Actualisation toutes les 10 secondes
    </script>
</body>
</html>
