<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Newsletters - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f8f9fa;
            color: #667eea;
        }
        tr:hover { background: #f5f5f5; }
        .emoji-list {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .emoji-badge {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.9rem;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-delete:hover { background: #c82333; }
        .loading { text-align: center; padding: 2rem; }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>📬 Gestion des Newsletters</h1>
        
        <div id="content">
            <div class="loading">Chargement des newsletters...</div>
        </div>

        <table id="newsletterTable" style="display: none;">
            <thead>
                <tr>
                    <th>JID</th>
                    <th>Emojis</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="newsletterList"></tbody>
        </table>
    </div>

    <script>
        async function loadNewsletters() {
            try {
                const response = await fetch('/api/newsletters');
                const data = await response.json();
                
                if (data.ok && data.list) {
                    const table = document.getElementById('newsletterTable');
                    const tbody = document.getElementById('newsletterList');
                    const content = document.getElementById('content');
                    
                    if (data.list.length === 0) {
                        content.innerHTML = '<div class="error">Aucune newsletter trouvée</div>';
                        return;
                    }
                    
                    tbody.innerHTML = '';
                    data.list.forEach(news => {
                        const row = tbody.insertRow();
                        
                        // JID cell
                        const jidCell = row.insertCell();
                        jidCell.textContent = news.jid || news;
                        
                        // Emojis cell
                        const emojiCell = row.insertCell();
                        const emojis = news.emojis || [];
                        const emojiDiv = document.createElement('div');
                        emojiDiv.className = 'emoji-list';
                        emojis.forEach(emoji => {
                            const span = document.createElement('span');
                            span.className = 'emoji-badge';
                            span.textContent = emoji;
                            emojiDiv.appendChild(span);
                        });
                        emojiCell.appendChild(emojiDiv);
                        
                        // Actions cell
                        const actionCell = row.insertCell();
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-delete';
                        deleteBtn.textContent = 'Supprimer';
                        deleteBtn.onclick = () => deleteNewsletter(news.jid || news);
                        actionCell.appendChild(deleteBtn);
                    });
                    
                    table.style.display = 'table';
                    content.style.display = 'none';
                }
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">Erreur de chargement: ' + error.message + '</div>';
            }
        }

        async function deleteNewsletter(jid) {
            if (!confirm(`Supprimer la newsletter ${jid} ?`)) return;
            
            try {
                const response = await fetch('/newsletter/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jid })
                });
                
                const data = await response.json();
                if (response.ok) {
                    alert('Newsletter supprimée avec succès');
                    loadNewsletters();
                } else {
                    alert('Erreur: ' + data.error);
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        loadNewsletters();
    </script>
</body>
</html>
