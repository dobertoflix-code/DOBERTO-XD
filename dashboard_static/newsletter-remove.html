<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supprimer Newsletter - DOBERTO-XD</title>
    <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>🗑️ Supprimer une Newsletter</h1>
        
        <div id="message" class="message"></div>
        
        <form id="deleteForm">
            <div class="form-group">
                <label for="jid">Sélectionnez la newsletter:</label>
                <select id="jid" name="jid" required>
                    <option value="">Chargement...</option>
                </select>
            </div>
            
            <button type="submit" class="btn-delete">Supprimer la Newsletter</button>
        </form>
    </div>

    <script>
        async function loadNewsletters() {
            try {
                const response = await fetch('/api/newsletters');
                const data = await response.json();
                const select = document.getElementById('jid');
                
                if (data.ok && data.list) {
                    select.innerHTML = '<option value="">Sélectionnez une newsletter</option>';
                    data.list.forEach(news => {
                        const option = document.createElement('option');
                        option.value = news.jid || news;
                        option.textContent = news.jid || news;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                select.innerHTML = '<option value="">Erreur de chargement</option>';
            }
        }

        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jid = document.getElementById('jid').value;
            if (!jid) {
                alert('Veuillez sélectionner une newsletter');
                return;
            }
            
            if (!confirm(`Êtes-vous sûr de vouloir supprimer ${jid} ?`)) return;
            
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'Suppression en cours...';
            
            try {
                const response = await fetch('/newsletter/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jid })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Newsletter supprimée avec succès!';
                    loadNewsletters(); // Recharger la liste
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Erreur: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Erreur: ' + error.message;
            }
        });

        loadNewsletters();
    </script>
</body>
</html>
