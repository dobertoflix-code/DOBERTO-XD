<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconnecter Sessions - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
        }
        .btn-reconnect {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 1rem 0;
            transition: transform 0.3s;
        }
        .btn-reconnect:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,193,7,0.4);
        }
        .results {
            margin-top: 2rem;
            display: none;
        }
        .results.show { display: block; }
        .result-item {
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 8px;
        }
        .result-item.connected {
            background: #cce5ff;
            color: #004085;
        }
        .result-item.initiated {
            background: #d4edda;
            color: #155724;
        }
        .result-item.failed {
            background: #f8d7da;
            color: #721c24;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
            display: none;
        }
        .progress-bar.show { display: block; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>📡 Reconnecter les Sessions</h1>
        
        <div class="info-box">
            <strong>ℹ️ Info:</strong> Cette action va reconnecter toutes les sessions inactives avec un délai de 1 seconde entre chaque tentative.
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <button id="reconnectBtn" class="btn-reconnect">🔄 Lancer la reconnexion</button>
        
        <div id="results" class="results">
            <h3>📋 Résultats:</h3>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        document.getElementById('reconnectBtn').addEventListener('click', async () => {
            const btn = document.getElementById('reconnectBtn');
            const results = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            btn.disabled = true;
            btn.textContent = 'Reconnexion en cours...';
            results.classList.remove('show');
            resultsList.innerHTML = '';
            progressBar.classList.add('show');
            progressFill.style.width = '0%';
            
            try {
                const response = await fetch('/reconnect');
                const data = await response.json();
                
                if (response.ok) {
                    results.classList.add('show');
                    
                    let completed = 0;
                    data.connections.forEach((conn, index) => {
                        setTimeout(() => {
                            const item = document.createElement('div');
                            
                            if (conn.status === 'already_connected') {
                                item.className = 'result-item connected';
                                item.innerHTML = `<strong>${conn.number}</strong> - 🟢 Déjà connecté`;
                            } else if (conn.status === 'connection_initiated') {
                                item.className = 'result-item initiated';
                                item.innerHTML = `<strong>${conn.number}</strong> - ✅ Connexion initiée`;
                            } else {
                                item.className = 'result-item failed';
                                item.innerHTML = `<strong>${conn.number}</strong> - ❌ Échec: ${conn.error || 'Erreur inconnue'}`;
                            }
                            
                            resultsList.appendChild(item);
                            completed++;
                            progressFill.style.width = `${(completed / data.connections.length) * 100}%`;
                        }, index * 100); // Petit délai pour l'animation
                    });
                } else {
                    alert('Erreur: ' + data.error);
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 Lancer la reconnexion';
            }
        });
    </script>
</body>
</html>
