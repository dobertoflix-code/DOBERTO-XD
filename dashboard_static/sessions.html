<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Sessions - DOBERTO-XD</title>
    <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>📱 Gestion des Sessions</h1>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Actualiser</button>
        
        <div class="stats">
            <div class="stat-box">
                <div class="label">Total Sessions</div>
                <div class="value" id="totalSessions">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Sessions Actives</div>
                <div class="value" id="activeSessions">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Sessions Inactives</div>
                <div class="value" id="inactiveSessions">0</div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Numéro</th>
                    <th>Statut</th>
                    <th>Dernière mise à jour</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="sessionsList"></tbody>
        </table>
    </div>

    <script>
        let activeSet = new Set();

        async function loadActiveSessions() {
            try {
                const response = await fetch('/api/active');
                const data = await response.json();
                if (data.ok) {
                    activeSet = new Set(data.active);
                    document.getElementById('activeSessions').textContent = data.count;
                }
            } catch (error) {
                console.error('Error loading active sessions:', error);
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                
                if (data.ok) {
                    const tbody = document.getElementById('sessionsList');
                    tbody.innerHTML = '';
                    
                    document.getElementById('totalSessions').textContent = data.sessions.length;
                    
                    data.sessions.forEach(session => {
                        const row = tbody.insertRow();
                        const isActive = activeSet.has(session.number);
                        
                        // Number cell
                        const numCell = row.insertCell();
                        numCell.textContent = session.number;
                        
                        // Status cell
                        const statusCell = row.insertCell();
                        const statusBadge = document.createElement('span');
                        statusBadge.className = `status-badge ${isActive ? 'status-active' : 'status-inactive'}`;
                        statusBadge.textContent = isActive ? 'ACTIF' : 'INACTIF';
                        statusCell.appendChild(statusBadge);
                        
                        // Updated at cell
                        const dateCell = row.insertCell();
                        if (session.updatedAt) {
                            dateCell.textContent = new Date(session.updatedAt).toLocaleString();
                        } else {
                            dateCell.textContent = 'Inconnue';
                        }
                        
                        // Actions cell
                        const actionCell = row.insertCell();
                        const actionDiv = document.createElement('div');
                        actionDiv.className = 'action-buttons';
                        
                        // Config button
                        const configBtn = document.createElement('a');
                        configBtn.href = `/dashboard/static/session-config.html?number=${session.number}`;
                        configBtn.className = 'btn-config';
                        configBtn.textContent = '⚙️ Config';
                        actionDiv.appendChild(configBtn);
                        
                        // Delete button
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-delete';
                        deleteBtn.textContent = '🗑️ Supprimer';
                        deleteBtn.onclick = () => deleteSession(session.number);
                        actionDiv.appendChild(deleteBtn);
                        
                        actionCell.appendChild(actionDiv);
                    });
                    
                    document.getElementById('inactiveSessions').textContent = 
                        data.sessions.length - activeSet.size;
                }
            } catch (error) {
                alert('Erreur de chargement: ' + error.message);
            }
        }

        async function deleteSession(number) {
            if (!confirm(`Supprimer la session ${number} ?`)) return;
            
            try {
                const response = await fetch('/api/session/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number })
                });
                
                const data = await response.json();
                if (data.ok) {
                    alert('Session supprimée avec succès');
                    loadData();
                } else {
                    alert('Erreur: ' + data.error);
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function loadData() {
            await loadActiveSessions();
            await loadSessions();
        }

        loadData();
        setInterval(loadActiveSessions, 5000); // Mise à jour toutes les 5 secondes
    </script>
</body>
</html>
