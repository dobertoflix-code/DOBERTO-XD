<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supprimer Admin - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-delete:hover { background: #c82333; }
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>🗑️ Supprimer un Administrateur</h1>
        
        <div id="message" class="message"></div>
        
        <form id="deleteForm">
            <div class="form-group">
                <label for="jid">Sélectionnez l'admin:</label>
                <select id="jid" name="jid" required>
                    <option value="">Chargement...</option>
                </select>
            </div>
            
            <button type="submit" class="btn-delete">Supprimer Admin</button>
        </form>
    </div>

    <script>
        async function loadAdmins() {
            try {
                const response = await fetch('/api/admins');
                const data = await response.json();
                const select = document.getElementById('jid');
                
                if (data.ok && data.list) {
                    select.innerHTML = '<option value="">Sélectionnez un admin</option>';
                    data.list.forEach(admin => {
                        const option = document.createElement('option');
                        option.value = admin;
                        option.textContent = admin;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                select.innerHTML = '<option value="">Erreur de chargement</option>';
            }
        }

        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jid = document.getElementById('jid').value;
            if (!jid) {
                alert('Veuillez sélectionner un admin');
                return;
            }
            
            if (!confirm(`Supprimer l'admin ${jid} ?`)) return;
            
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'Suppression en cours...';
            
            try {
                const response = await fetch('/admin/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jid })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Admin supprimé avec succès!';
                    loadAdmins(); // Recharger la liste
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Erreur: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Erreur: ' + error.message;
            }
        });

        loadAdmins();
    </script>
</body>
</html>
