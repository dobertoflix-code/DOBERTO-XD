<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Admin - DOBERTO-XD</title>
    <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>➕ Ajouter un Administrateur</h1>
        
        <div class="format-example">
            <strong>Formats acceptés:</strong><br>
            • Numéro simple: 33612345678<br>
            • JID complet: 33612345678@s.whatsapp.net<br>
            • Avec indicatif: +33612345678
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="addForm">
            <div class="form-group">
                <label for="jid">JID ou Numéro:</label>
                <input type="text" id="jid" name="jid" required 
                    placeholder="Ex: 33612345678">
            </div>
            
            <button type="submit" class="btn-add">Ajouter Admin</button>
        </form>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jid = document.getElementById('jid').value.trim();
            
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'Ajout en cours...';
            
            try {
                const response = await fetch('/admin/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jid })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Admin ajouté avec succès!';
                    document.getElementById('addForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Erreur: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Erreur: ' + error.message;
            }
        });
    </script>
</body>
</html>
