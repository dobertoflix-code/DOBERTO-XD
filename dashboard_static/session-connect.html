<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecter Session - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .btn-connect {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s;
        }
        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .qrcode {
            text-align: center;
            margin: 2rem 0;
            padding: 2rem;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .qrcode img {
            max-width: 300px;
            border: 10px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            display: none;
        }
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>🔌 Connecter un Numéro</h1>
        
        <div id="message" class="message"></div>
        
        <form id="connectForm">
            <div class="form-group">
                <label for="number">Numéro (format international):</label>
                <input type="text" id="number" name="number" required 
                    placeholder="Ex: 33612345678">
            </div>
            
            <button type="submit" class="btn-connect">Connecter</button>
        </form>
        
        <div id="qrcode" class="qrcode">
            <h3>Scannez ce QR Code avec WhatsApp</h3>
            <img id="qrimg" src="" alt="QR Code">
            <p id="qrstatus" style="margin-top: 1rem;">En attente de scan...</p>
        </div>
    </div>

    <script>
        let eventSource = null;

        document.getElementById('connectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const number = document.getElementById('number').value.trim();
            const messageDiv = document.getElementById('message');
            const qrcodeDiv = document.getElementById('qrcode');
            
            messageDiv.className = 'message';
            messageDiv.textContent = 'Connexion en cours...';
            
            try {
                const response = await fetch(`/?number=${encodeURIComponent(number)}`);
                const data = await response.json();
                
                if (response.ok) {
                    if (data.status === 'already_connected') {
                        messageDiv.className = 'message info';
                        messageDiv.textContent = 'ℹ️ Ce numéro est déjà connecté';
                    } else {
                        messageDiv.className = 'message success';
                        messageDiv.textContent = '✅ Connexion initiée. En attente du QR code...';
                        
                        // Connect to SSE for QR code
                        if (eventSource) eventSource.close();
                        eventSource = new EventSource(`/qr-stream?number=${number}`);
                        
                        eventSource.onmessage = function(event) {
                            const data = JSON.parse(event.data);
                            if (data.qr) {
                                qrcodeDiv.style.display = 'block';
                                document.getElementById('qrimg').src = data.qr;
                            }
                            if (data.status === 'connected') {
                                messageDiv.className = 'message success';
                                messageDiv.textContent = '✅ Connecté avec succès!';
                                qrcodeDiv.style.display = 'none';
                                eventSource.close();
                            }
                        };
                    }
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Erreur: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Erreur: ' + error.message;
            }
        });
    </script>
</body>
</html>
