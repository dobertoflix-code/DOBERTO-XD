<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecter Toutes les Sessions - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
        }
        .btn-connect {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 1rem 0;
            transition: transform 0.3s;
        }
        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
        }
        .results {
            margin-top: 2rem;
            display: none;
        }
        .results.show { display: block; }
        .result-item {
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-item.success {
            background: #d4edda;
            color: #155724;
        }
        .result-item.already_connected {
            background: #cce5ff;
            color: #004085;
        }
        .result-item.failed {
            background: #f8d7da;
            color: #721c24;
        }
        .status-badge {
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.success { background: #28a745; color: white; }
        .status-badge.already { background: #007bff; color: white; }
        .status-badge.failed { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>🔄 Connecter Toutes les Sessions</h1>
        
        <div class="warning-box">
            <strong>⚠️ Attention:</strong> Cette action va initier la connexion de toutes les sessions enregistrées dans la base de données. Cela peut prendre quelques minutes.
        </div>
        
        <button id="connectBtn" class="btn-connect">🚀 Lancer la connexion</button>
        
        <div id="results" class="results">
            <h3>📋 Résultats:</h3>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        document.getElementById('connectBtn').addEventListener('click', async () => {
            const btn = document.getElementById('connectBtn');
            const results = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');
            
            btn.disabled = true;
            btn.textContent = 'Connexion en cours...';
            results.classList.remove('show');
            resultsList.innerHTML = '';
            
            try {
                const response = await fetch('/connect-all');
                const data = await response.json();
                
                if (response.ok) {
                    results.classList.add('show');
                    
                    data.connections.forEach(conn => {
                        const item = document.createElement('div');
                        item.className = `result-item ${conn.status}`;
                        
                        let statusText = '';
                        let statusClass = '';
                        
                        switch(conn.status) {
                            case 'connection_initiated':
                                statusText = '✅ Connexion initiée';
                                statusClass = 'success';
                                break;
                            case 'already_connected':
                                statusText = '🟢 Déjà connecté';
                                statusClass = 'already';
                                break;
                            case 'failed':
                                statusText = '❌ Échec: ' + (conn.error || 'Erreur inconnue');
                                statusClass = 'failed';
                                break;
                        }
                        
                        item.innerHTML = `
                            <span><strong>${conn.number}</strong></span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        `;
                        
                        resultsList.appendChild(item);
                    });
                } else {
                    alert('Erreur: ' + data.error);
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Lancer la connexion';
            }
        });
    </script>
</body>
</html>
