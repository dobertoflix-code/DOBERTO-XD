<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Newsletter - DOBERTO-XD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .helper-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
        <h1>➕ Ajouter une Newsletter</h1>
        
        <div id="message" class="message"></div>
        
        <form id="addForm">
            <div class="form-group">
                <label for="jid">JID de la Newsletter:</label>
                <input type="text" id="jid" name="jid" required 
                    placeholder="Ex: 123456789@newsletter">
                <div class="helper-text">Doit se terminer par @newsletter</div>
            </div>
            
            <div class="form-group">
                <label for="emojis">Emojis (séparés par des virgules):</label>
                <textarea id="emojis" name="emojis" rows="3" 
                    placeholder="Ex: 👍, ❤️, 😂, 🔥"></textarea>
                <div class="helper-text">Laissez vide si aucun emoji</div>
            </div>
            
            <button type="submit" class="btn-submit">Ajouter la Newsletter</button>
        </form>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jid = document.getElementById('jid').value.trim();
            const emojisInput = document.getElementById('emojis').value.trim();
            const emojis = emojisInput ? emojisInput.split(',').map(e => e.trim()) : [];
            
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'Envoi en cours...';
            
            try {
                const response = await fetch('/newsletter/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jid, emojis })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Newsletter ajoutée avec succès!';
                    document.getElementById('addForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Erreur: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Erreur: ' + error.message;
            }
        });
    </script>
</body>
</html>
