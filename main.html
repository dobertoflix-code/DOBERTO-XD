<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOBERTO-XD X Community MD PAIRING</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
}

/* ===== Background Video ===== */
video.bg-video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.4);
}

/* ===== Center ===== */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== Box ===== */
.box{
  width:350px;
  padding:30px;
  background:rgba(0, 0, 0, 0.85);
  border-radius:12px;
  text-align:center;
  position:relative;
  border:1px solid rgba(255, 255, 255, 0.1);
  box-shadow:0 10px 30px rgba(0, 0, 0, 0.5);
}

/* ===== TITLE ===== */
.title{
  font-size:26px;
  font-weight:bold;
  color:#ffffff;
  margin-bottom:8px;
  letter-spacing:1px;
}

.subtitle{
  color:#b0b0b0;
  margin-top:8px;
  font-size:14px;
}

.label{
  color:#4fc3f7;
  margin:20px 0 10px 0;
  font-size:15px;
}

/* ===== Input ===== */
.input-container{
  display:flex;
  margin-top:15px;
}

.input-container input{
  width:70%;
  height:48px;
  border:none;
  outline:none;
  border-radius:8px 0 0 8px;
  padding-left:15px;
  font-size:16px;
  background:rgba(255, 255, 255, 0.1);
  color:white;
  border:1px solid rgba(255, 255, 255, 0.2);
}

.input-container input::placeholder{
  color:#aaa;
}

.input-container button{
  width:30%;
  height:48px;
  border:none;
  border-radius:0 8px 8px 0;
  background:#4fc3f7;
  font-weight:bold;
  cursor:pointer;
  color:#000;
  transition:background 0.3s;
}

.input-container button:hover{
  background:#29b6f6;
}

/* ===== Code Display ===== */
#pair{
  margin-top:20px;
  min-height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.code-display{
  background:rgba(0, 0, 0, 0.6);
  border:1px solid rgba(255, 255, 255, 0.15);
  border-radius:8px;
  padding:12px 20px;
  color:#4fc3f7;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  transition:all 0.3s;
  width:100%;
  text-align:center;
}

.code-display:hover{
  background:rgba(79, 195, 247, 0.1);
  border-color:#4fc3f7;
}

.code-display.copied{
  background:rgba(76, 175, 80, 0.2);
  color:#4caf50;
  border-color:#4caf50;
}

/* ===== Music Button (Top Right) ===== */
.music-btn{
  position:fixed;
  right:20px;
  top:20px;
  background:rgba(0, 0, 0, 0.7);
  color:#4fc3f7;
  padding:10px 16px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  border:1px solid #4fc3f7;
  z-index:10;
  display:flex;
  align-items:center;
  gap:8px;
  transition:all 0.3s;
}

.music-btn:hover{
  background:rgba(79, 195, 247, 0.2);
  box-shadow:0 0 10px rgba(79, 195, 247, 0.5);
}

/* ===== Icon ===== */
.icon{
  color:#4fc3f7;
  font-size:24px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- Background Video -->
<video class="bg-video" autoplay muted loop>
  <source src="https://uploader.zenzxz.dpdns.org/uploads/1769499275224.mp4" type="video/mp4">
</video>

<!-- Music Button Top Right -->
<div class="music-btn" onclick="toggleMusic()" id="musicBtn">
  <i class="fas fa-music"></i>
  <span>Play</span>
</div>

<div class="container">
  <div class="box">
    <i class="fas fa-user icon"></i>

    <div class="title">DOBERTO-XD X Community-MD MINI</div>
    <div class="subtitle">DEVELOPPÉ PAR DOBERTO X TEAM Community</div>
    <div class="label">👑 ENTER YOUR NUMBER (sans le +)</div>

    <div class="input-container">
      <input type="number" id="number" placeholder="5094744xxxxxxx">
      <button id="submit">Submit</button>
    </div>

    <main id="pair"></main>
  </div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
let pairElement = document.getElementById("pair");
let submitBtn = document.getElementById("submit");
let numberInput = document.getElementById("number");

let music = document.getElementById("bgMusic");
let musicBtn = document.getElementById("musicBtn");
let started = false;

// Mobile safe autoplay
document.body.addEventListener("click", () => {
  if (!started) {
    music.play().then(() => {
      musicBtn.querySelector('span').textContent = "Pause";
      musicBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
      started = true;
    }).catch(() => {});
  }
}, { once: true });

function toggleMusic() {
  if (music.paused) {
    music.play();
    musicBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
  } else {
    music.pause();
    musicBtn.innerHTML = '<i class="fas fa-music"></i><span>Play</span>';
  }
}

async function copyCode() {
  let codeElement = document.getElementById("codeDisplay");
  if (!codeElement) return;
  
  let code = codeElement.innerText.replace('CODE: ', '');
  await navigator.clipboard.writeText(code);
  
  // Visual feedback
  codeElement.classList.add('copied');
  codeElement.innerHTML = '<i class="fas fa-check"></i> Code copié';
  
  setTimeout(() => {
    codeElement.classList.remove('copied');
    codeElement.innerHTML = `CODE: <span style="color:#ffffff">${code}</span>`;
  }, 2000);
}

submitBtn.addEventListener("click", async (e) => {
  e.preventDefault();
  
  if (!numberInput.value) {
    pairElement.innerHTML = '<span style="color:#ff6b6b">Entrez votre numéro (sans le +)</span>';
    return;
  }
  
  let cleanNumber = numberInput.value.replace(/[^0-9]/g, "");
  
  if (cleanNumber.length < 11) {
    pairElement.innerHTML = '<span style="color:#ff6b6b">Numéro Invalide</span>';
    return;
  }
  
  pairElement.innerHTML = '<span style="color:#ffffff">Veuillez patienter...</span>';
  
  try {
    let { data } = await axios(`/code?number=${cleanNumber}`);
    let code = data.code || "Indisponible";
    
    pairElement.innerHTML = `
      <div class="code-display" id="codeDisplay" onclick="copyCode()">
        CODE: <span style="color:#ffffff">${code}</span>
      </div>
    `;
  } catch (error) {
    pairElement.innerHTML = '<span style="color:#ff6b6b">Erreur de connexion</span>';
  }
});

// Allow Enter key to submit
numberInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    submitBtn.click();
  }
});
</script>

</body>
</html>
