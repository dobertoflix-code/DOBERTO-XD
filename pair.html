<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOBERTO-XD — Konekte Sesyon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      width: min(100%, 420px);
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #25d366;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
    }
    label {
      display: block;
      text-align: left;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #25d366; }
    .hint { font-size: 11.5px; color: #555; text-align: left; margin-top: 6px; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 13px;
      background: #25d366;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .result.success {
      background: rgba(37,211,102,0.1);
      border: 1px solid rgba(37,211,102,0.3);
      color: #25d366;
      display: block;
    }
    .result.error {
      background: rgba(229,9,20,0.1);
      border: 1px solid rgba(229,9,20,0.3);
      color: #ff6666;
      display: block;
    }
    .pair-code {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 6px;
      margin: 10px 0;
      color: #fff;
    }
    .steps {
      margin-top: 24px;
      text-align: left;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .steps p { font-size: 12.5px; color: #888; margin-bottom: 6px; line-height: 1.6; }
    .steps strong { color: #ccc; }
    .loader {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🤖 DOBERTO-XD</div>
    <div class="sub">Konekte sesyon WhatsApp ou</div>

    <label>Nimewo WhatsApp (ak kòd peyi)</label>
    <input type="text" id="phone" placeholder="50912345678" maxlength="20">
    <div class="hint">Egzanp pou Ayiti: 50912345678 — pa mete + oswa espas</div>

    <button id="btn" onclick="getPairCode()">
      <span id="btn-text">Jwenn kòd pairing</span>
      <div class="loader" id="loader"></div>
    </button>

    <div class="result" id="result"></div>

    <div class="steps">
      <p><strong>Kòman pou itilize kòd la:</strong></p>
      <p>1. Ouvri WhatsApp → Paramèt → Appareils liés</p>
      <p>2. Klike "Lier un appareil"</p>
      <p>3. Chwazi "Lier avec numéro de téléphone"</p>
      <p>4. Tape kòd 8 chif la ki parèt anlè a</p>
    </div>
  </div>

  <script>
    async function getPairCode() {
      const phone = document.getElementById('phone').value.trim().replace(/[^0-9]/g, '');
      const result = document.getElementById('result');
      const btn = document.getElementById('btn');
      const btnText = document.getElementById('btn-text');
      const loader = document.getElementById('loader');

      result.className = 'result';
      result.innerHTML = '';

      if (!phone || phone.length < 8) {
        result.className = 'result error';
        result.innerHTML = '⚠️ Antre yon nimewo valid (minimum 8 chif)';
        return;
      }

      btn.disabled = true;
      btnText.style.display = 'none';
      loader.style.display = 'block';

      try {
        const res = await fetch(`/code/?number=${encodeURIComponent(phone)}`);
        const data = await res.json();

        if (data.code || data.pairingCode || data.pairing_code) {
          const code = data.code || data.pairingCode || data.pairing_code;
          result.className = 'result success';
          result.innerHTML = `
            ✅ Kòd ou a prèt!<br>
            <div class="pair-code">${code}</div>
            <small style="color:#aaa;font-size:12px">Kòd sa a valid pou kèk minit sèlman</small>
          `;
        } else if (data.status === 'already_connected') {
          result.className = 'result success';
          result.innerHTML = '✅ Nimewo sa a deja konekte!';
        } else {
          result.className = 'result error';
          result.innerHTML = '❌ ' + (data.error || data.message || 'Erè enkoni — eseye ankò');
        }
      } catch (e) {
        result.className = 'result error';
        result.innerHTML = '❌ Koneksyon echwe — verifye sèvè a ap kouri';
      } finally {
        btn.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    }

    document.getElementById('phone').addEventListener('keydown', e => {
      if (e.key === 'Enter') getPairCode();
    });
  </script>
</body>
</html>
